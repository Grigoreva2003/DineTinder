<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DineTinder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1 class="logo">DineTinder</h1>
            <ul class="nav-links">
                <li><a href="#">главная</a></li>
                <li><a href="#">об авторе</a></li>
            </ul>
            <div class="user-icon">
                <img src="user-icon.png" alt="User Icon">
            </div>
        </nav>
    </header>
    <section class="hero">
        <h2>Ваш ключевой ингредиент <br> для идеального приема пищи</h2>
        <p>Поиск новых мест занимает много времени. Позвольте DineTinder ускорить этот процесс и предлагать Вам новые заведения за один клик</p>
        <button class="recommend-btn">ПОЛУЧИТЬ РЕКОМЕНДАЦИЮ</button>
    </section>
    <footer>
        <p>При поддержке</p>
        <div class="sponsors">
            <img src="support1.png" alt="Support Logo">
            <img src="support2.png" alt="Support Logo">
            <img src="support3.png" alt="Support Logo">
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
